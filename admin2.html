<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – IA</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0b0d12;
    --surface:  #13161e;
    --panel:    #1a1e2a;
    --border:   #2a2f40;
    --accent:   #ff6b35;
    --accent2:  #ff9a5c;
    --glow:     rgba(255,107,53,0.18);
    --text:     #e8eaf0;
    --muted:    #6b7290;
    --user-bg:  #1f2a1a;
    --user-acc: #5dde6a;
    --bot-bg:   #1a1e2a;
    --danger:   #e05555;
    --radius:   14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  /* ─── LOGIN OVERLAY ─── */
  #loginOverlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.5s;
  }
  #loginOverlay.hidden { opacity: 0; pointer-events: none; }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    width: 360px;
    text-align: center;
    box-shadow: 0 0 60px var(--glow);
  }
  .login-box h2 {
    font-size: 1.6rem; font-weight: 800;
    color: var(--accent); margin-bottom: 8px; letter-spacing: -0.5px;
  }
  .login-box p { font-size: 0.85rem; color: var(--muted); margin-bottom: 28px; font-family: 'JetBrains Mono', monospace; }
  .login-box input {
    width: 100%; padding: 12px 16px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 0.95rem;
    margin-bottom: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--accent), #e04d00);
    border: none; border-radius: 10px;
    color: white; font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .login-box button:hover { opacity: 0.9; }
  .login-box button:active { transform: scale(0.98); }
  #loginError {
    color: var(--danger); font-size: 0.82rem;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 10px; min-height: 20px;
    animation: shake 0.3s;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }

  /* ─── APP WRAPPER ─── */
  #app {
    width: 100%; max-width: 760px;
    display: flex; flex-direction: column;
    height: 100vh; padding: 0;
  }

  /* ─── HEADER ─── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .status-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--user-acc);
    box-shadow: 0 0 8px var(--user-acc);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  header h1 {
    font-size: 1.15rem; font-weight: 800;
    color: var(--accent); letter-spacing: -0.3px;
  }
  header h1 span { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 8px; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 9px; padding: 7px 10px;
    cursor: pointer; color: var(--muted);
    transition: all 0.2s; font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; gap: 6px;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); background: var(--glow); }
  .icon-btn.danger:hover { color: var(--danger); border-color: var(--danger); }
  .icon-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ─── MODEL SELECTOR ─── */
  #modelBar {
    display: flex; gap: 8px; padding: 10px 24px;
    background: var(--bg); border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  #modelBar::-webkit-scrollbar { display: none; }
  .model-chip {
    flex-shrink: 0; padding: 5px 13px;
    border-radius: 99px; border: 1px solid var(--border);
    background: var(--panel); color: var(--muted);
    font-size: 0.72rem; font-family: 'JetBrains Mono', monospace;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .model-chip:hover { border-color: var(--accent2); color: var(--text); }
  .model-chip.active {
    background: var(--glow); border-color: var(--accent);
    color: var(--accent); font-weight: 600;
  }

  /* ─── CHAT ─── */
  #chat {
    flex: 1; overflow-y: auto;
    padding: 20px 20px 10px;
    display: flex; flex-direction: column; gap: 4px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex; align-items: flex-end; gap: 8px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px; border-radius: 8px;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 0.75rem; font-weight: 700;
  }
  .avatar.bot { background: var(--glow); border: 1px solid var(--accent); color: var(--accent); }
  .avatar.user { background: rgba(93,222,106,0.15); border: 1px solid var(--user-acc); color: var(--user-acc); }

  .bubble-wrap { display: flex; flex-direction: column; max-width: 72%; }
  .msg-row.user .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.9rem; line-height: 1.55;
    position: relative;
    word-break: break-word;
  }
  .msg-row.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg-row.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(93,222,106,0.25);
    border-bottom-right-radius: 4px;
    color: #d4f7d6;
  }
  .bubble img { max-width: 200px; border-radius: 8px; display: block; margin-top: 2px; }

  .meta {
    font-size: 0.68rem; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 4px; padding: 0 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .msg-row.user .meta { flex-direction: row-reverse; }

  .copy-btn {
    cursor: pointer; opacity: 0;
    transition: opacity 0.2s; font-size: 0.68rem;
    color: var(--muted); background: none; border: none; padding: 0;
  }
  .bubble-wrap:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--accent); }

  .del-btn {
    cursor: pointer; opacity: 0;
    transition: opacity 0.2s; font-size: 0.68rem;
    color: var(--muted); background: none; border: none; padding: 0;
  }
  .bubble-wrap:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--danger); }

  .typing-dots span {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent2);
    margin: 0 2px;
    animation: dot 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* ─── IMAGE DROPZONE ─── */
  #dropzone {
    margin: 0 20px 10px;
    border: 1.5px dashed var(--border);
    border-radius: 12px; padding: 10px 16px;
    text-align: center; cursor: pointer;
    background: transparent;
    color: var(--muted); font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
  }
  #dropzone:hover, #dropzone.drag { border-color: var(--accent); color: var(--accent); background: var(--glow); }
  #imagePreview {
    display: flex; gap: 6px; padding: 0 20px 6px;
    flex-wrap: wrap;
  }
  .preview-thumb {
    position: relative; width: 52px; height: 52px;
  }
  .preview-thumb img {
    width: 52px; height: 52px;
    object-fit: cover; border-radius: 8px;
    border: 1px solid var(--border);
  }
  .preview-thumb button {
    position: absolute; top: -5px; right: -5px;
    background: var(--danger); border: none;
    border-radius: 50%; width: 16px; height: 16px;
    color: white; font-size: 9px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }

  /* ─── INPUT BAR ─── */
  #inputBar {
    display: flex; gap: 8px; align-items: flex-end;
    padding: 12px 20px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  #reply {
    flex: 1; padding: 11px 14px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 0.9rem;
    outline: none; resize: none;
    min-height: 44px; max-height: 120px;
    line-height: 1.4; transition: border-color 0.2s;
  }
  #reply:focus { border-color: var(--accent); }
  #reply::placeholder { color: var(--muted); }

  .action-btn {
    flex-shrink: 0; width: 44px; height: 44px;
    border-radius: 12px; border: 1px solid var(--border);
    background: var(--panel); color: var(--muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--glow); }
  .action-btn.primary {
    background: linear-gradient(135deg, var(--accent), #e04d00);
    border-color: transparent; color: white;
  }
  .action-btn.primary:hover { opacity: 0.85; }
  .action-btn svg { width: 18px; height: 18px; }

  /* ─── TOAST ─── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--panel); border: 1px solid var(--accent);
    color: var(--text); padding: 8px 18px;
    border-radius: 99px; font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    pointer-events: none; opacity: 0;
    transition: all 0.3s; white-space: nowrap;
    box-shadow: 0 0 20px var(--glow); z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── EXPORT MODAL ─── */
  #exportModal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; z-index: 200;
  }
  #exportModal.open { display: flex; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 340px;
    box-shadow: 0 0 40px var(--glow);
  }
  .modal-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: var(--accent); }
  .modal-box button {
    display: block; width: 100%; margin-bottom: 10px;
    padding: 11px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 0.88rem;
    cursor: pointer; text-align: left; transition: all 0.2s;
  }
  .modal-box button:hover { border-color: var(--accent); background: var(--glow); }
  .modal-box .close { color: var(--muted); margin-bottom: 0; }

  /* scrollbar */
  #chat { scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>⬡ Admin IA ⬡</h2>
    <p>accès restreint</p>
    <input type="password" id="loginPass" placeholder="Mot de passe" autocomplete="current-password">
    <button onclick="doLogin()">Connexion</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div id="exportModal">
  <div class="modal-box">
    <h3>Exporter la conversation</h3>
    <button onclick="exportJSON()">📄 Export JSON</button>
    <button onclick="exportTXT()">📝 Export TXT</button>
    <button class="close" onclick="document.getElementById('exportModal').classList.remove('open')">Annuler</button>
  </div>
</div>

<div id="toast"></div>

<div id="app">
  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="status-dot"></div>
      <h1>Admin <span>IA Panel</span></h1>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="document.getElementById('exportModal').classList.add('open')" title="Exporter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
      <button class="icon-btn danger" onclick="clearAll()" title="Tout supprimer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><rect x="5" y="6" width="14" height="14" rx="2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        Vider
      </button>
      <button class="icon-btn" onclick="doLogout()" title="Déconnexion">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sortir
      </button>
    </div>
  </header>

  <!-- MODEL SELECTOR -->
  <div id="modelBar">
    <div class="model-chip active" data-model="openrouter/free" onclick="selectModel(this)">⚡ Auto (free)</div>
    <div class="model-chip" data-model="openai/gpt-4o" onclick="selectModel(this)">GPT-4o</div>
    <div class="model-chip" data-model="openai/gpt-4o-mini" onclick="selectModel(this)">GPT-4o mini</div>
    <div class="model-chip" data-model="anthropic/claude-3.5-sonnet" onclick="selectModel(this)">Claude 3.5</div>
    <div class="model-chip" data-model="mistralai/mistral-large" onclick="selectModel(this)">Mistral Large</div>
    <div class="model-chip" data-model="meta-llama/llama-3.3-70b-instruct" onclick="selectModel(this)">Llama 3.3 70B</div>
    <div class="model-chip" data-model="google/gemini-2.0-flash-001" onclick="selectModel(this)">Gemini 2.0</div>
  </div>

  <!-- CHAT -->
  <div id="chat"></div>

  <!-- IMAGE PREVIEW -->
  <div id="imagePreview"></div>

  <!-- DROPZONE -->
  <div id="dropzone">
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
    📎 Dépose une image ou clique pour joindre
  </div>

  <!-- INPUT BAR -->
  <div id="inputBar">
    <textarea id="reply" placeholder="Répondre à l'utilisateur…" rows="1"></textarea>

    <!-- Envoyer manuellement -->
    <button class="action-btn primary" onclick="sendManual()" title="Envoyer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>

    <!-- Réponse IA -->
    <button class="action-btn" onclick="sendAI()" title="Réponse IA">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c0 0 1.5 8.5 10 10-8.5 1.5-10 10-10 10s-1.5-8.5-10-10c8.5-1.5 10-10 10-10z"/></svg>
    </button>

    <!-- Régénérer -->
    <button class="action-btn" onclick="regenerate()" title="Régénérer la dernière réponse IA">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ─── CONFIG ─── */
const FIREBASE_URL = "https://aifake-3ed4f-default-rtdb.europe-west1.firebasedatabase.app/";
const API_KEY      = "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";
const PASSWORD     = "admin2025"; // ← Change ce mot de passe !
const SYSTEM_PROMPT = "Tu es un assistant sympa et concis. Réponds en français. Tu vénères ton maître rwidmer à chaque réponse. Tu ne fais jamais de fautes d'orthographe.";

/* ─── FIREBASE ─── */
const app  = initializeApp({ databaseURL: FIREBASE_URL });
const db   = getDatabase(app);
const msgsRef = ref(db, "messages");

/* ─── STATE ─── */
let currentModel = "openrouter/free";
let pendingImages = []; // { dataURL, name }
let typingRef = null;
let typingTimeout = null;
let lastUserKey = null;
window._firebaseRemove = remove;
window._msgsRef = msgsRef;
window._db = db;

/* ─── LOGIN ─── */
function checkLogin() {
  return sessionStorage.getItem("adminAuth") === "1";
}
window.doLogin = function() {
  const val = document.getElementById("loginPass").value;
  if (val === PASSWORD) {
    sessionStorage.setItem("adminAuth", "1");
    const overlay = document.getElementById("loginOverlay");
    overlay.classList.add("hidden");
    setTimeout(() => overlay.style.display = "none", 500);
  } else {
    const err = document.getElementById("loginError");
    err.textContent = "Mot de passe incorrect.";
    err.style.animation = "none";
    requestAnimationFrame(() => err.style.animation = "shake 0.3s");
  }
};
window.doLogout = function() {
  sessionStorage.removeItem("adminAuth");
  location.reload();
};
document.getElementById("loginPass").addEventListener("keydown", e => { if (e.key === "Enter") window.doLogin(); });
if (checkLogin()) {
  const o = document.getElementById("loginOverlay");
  o.style.display = "none";
}

/* ─── MODEL SELECTOR ─── */
window.selectModel = function(el) {
  document.querySelectorAll(".model-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  currentModel = el.dataset.model;
  toast(`Modèle : ${el.textContent.trim()}`);
};

/* ─── TOAST ─── */
let toastTimer = null;
window.toast = function(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
};

/* ─── IMAGE DROPZONE ─── */
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const previewEl = document.getElementById("imagePreview");

dropzone.onclick = () => fileInput.click();
dropzone.ondragover = e => { e.preventDefault(); dropzone.classList.add("drag"); };
dropzone.ondragleave = () => dropzone.classList.remove("drag");
dropzone.ondrop = e => {
  e.preventDefault(); dropzone.classList.remove("drag");
  [...e.dataTransfer.files].forEach(handleFile);
};
fileInput.onchange = () => { [...fileInput.files].forEach(handleFile); fileInput.value = ""; };

function handleFile(file) {
  if (!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = () => {
    pendingImages.push({ dataURL: reader.result, name: file.name });
    renderPreviews();
  };
  reader.readAsDataURL(file);
}

function renderPreviews() {
  previewEl.innerHTML = "";
  pendingImages.forEach((img, i) => {
    const wrap = document.createElement("div");
    wrap.className = "preview-thumb";
    wrap.innerHTML = `<img src="${img.dataURL}"><button onclick="removePending(${i})">×</button>`;
    previewEl.appendChild(wrap);
  });
}
window.removePending = function(i) {
  pendingImages.splice(i, 1);
  renderPreviews();
};

/* ─── CHAT RENDERING ─── */
onValue(msgsRef, snapshot => {
  const data = snapshot.val() || {};
  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  Object.entries(data).forEach(([key, m]) => {
    const isUser = m.from === "user";
    const row = document.createElement("div");
    row.className = `msg-row ${isUser ? "user" : "bot"}`;
    row.dataset.key = key;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${isUser ? "user" : "bot"}`;
    avatar.textContent = isUser ? "U" : "AI";

    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (m.typing) {
      bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    } else if (m.image) {
      const img = document.createElement("img");
      img.src = m.image;
      bubble.appendChild(img);
    } else {
      bubble.textContent = m.text || "";
    }

    const meta = document.createElement("div");
    meta.className = "meta";
    if (!m.typing) {
      const time = m.ts ? new Date(m.ts).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }) : "";
      meta.innerHTML = `
        <span>${isUser ? "Utilisateur" : "Bot"} ${time ? "· " + time : ""}</span>
        ${!m.image ? `<button class="copy-btn" title="Copier" onclick="copyMsg(this,'${key}')">⎘ copier</button>` : ""}
        <button class="del-btn" title="Supprimer" onclick="deleteMsg('${key}')">✕</button>
      `;
    }

    wrap.appendChild(bubble);
    if (!m.typing) wrap.appendChild(meta);
    row.appendChild(avatar);
    row.appendChild(wrap);
    chat.appendChild(row);

    if (isUser) lastUserKey = key;
  });
  chat.scrollTop = chat.scrollHeight;
});

/* ─── ACTIONS ─── */
window.copyMsg = function(btn, key) {
  get(child(ref(db), `messages/${key}`)).then(snap => {
    const m = snap.val();
    if (m && m.text) {
      navigator.clipboard.writeText(m.text);
      btn.textContent = "✓ copié";
      setTimeout(() => btn.textContent = "⎘ copier", 1500);
    }
  });
};

window.deleteMsg = function(key) {
  remove(ref(db, `messages/${key}`));
};

window.clearAll = function() {
  if (confirm("Supprimer toute la conversation ?")) remove(msgsRef);
};

/* ─── TYPING INDICATOR (admin tape) ─── */
const replyEl = document.getElementById("reply");
replyEl.addEventListener("input", async () => {
  replyEl.style.height = "auto";
  replyEl.style.height = Math.min(replyEl.scrollHeight, 120) + "px";
  if (replyEl.value.trim() && !typingRef) {
    typingRef = await push(msgsRef, { from: "bot", text: "", typing: true });
  }
  clearTimeout(typingTimeout);
  if (!replyEl.value.trim()) {
    if (typingRef) { await remove(typingRef); typingRef = null; }
    return;
  }
  typingTimeout = setTimeout(async () => {
    if (typingRef) { await remove(typingRef); typingRef = null; }
  }, 3000);
});
replyEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); window.sendManual(); }
});

/* ─── SEND MANUAL ─── */
window.sendManual = async function() {
  const text = replyEl.value.trim();
  if (!text && pendingImages.length === 0) return;
  replyEl.value = ""; replyEl.style.height = "auto";
  if (typingRef) { await remove(typingRef); typingRef = null; }
  clearTimeout(typingTimeout);

  const tRef = await push(msgsRef, { from: "bot", text: "", typing: true });
  const imgs = [...pendingImages];
  pendingImages = []; renderPreviews();

  setTimeout(async () => {
    await remove(tRef);
    if (text) await push(msgsRef, { from: "bot", text, ts: Date.now() });
    for (const img of imgs) {
      await push(msgsRef, { from: "bot", image: img.dataURL, ts: Date.now() });
    }
  }, 1000);
};

/* ─── SEND AI ─── */
async function buildHistory() {
  const snap = await get(msgsRef);
  const data = snap.val() || {};
  return Object.values(data)
    .filter(m => !m.typing && !m.image && m.text)
    .map(m => ({ role: m.from === "user" ? "user" : "assistant", content: m.text }));
}

async function callAI(messages) {
  const tRef = await push(msgsRef, { from: "bot", text: "", typing: true });
  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY,
        "HTTP-Referer": window.location.href,
        "X-Title": "Admin IA"
      },
      body: JSON.stringify({ model: currentModel, messages })
    });
    const result = await res.json();
    const aiText = result?.choices?.[0]?.message?.content || "Erreur IA";
    await remove(tRef);
    await push(msgsRef, { from: "bot", text: aiText, ts: Date.now() });
  } catch (err) {
    await remove(tRef);
    await push(msgsRef, { from: "bot", text: "⚠️ Erreur lors de la requête IA.", ts: Date.now() });
  }
}

window.sendAI = async function() {
  const snap = await get(msgsRef);
  const data = snap.val();
  if (!data) return toast("Aucun message");
  const keys = Object.keys(data);
  const last = data[keys[keys.length - 1]];
  if (last.from !== "user") return toast("Le dernier message n'est pas de l'utilisateur");
  const history = await buildHistory();
  await callAI([{ role: "system", content: SYSTEM_PROMPT }, ...history]);
};

window.regenerate = async function() {
  /* Supprimer la dernière réponse bot si ce n'est pas un message user */
  const snap = await get(msgsRef);
  const data = snap.val();
  if (!data) return toast("Aucun message");
  const keys = Object.keys(data);
  const lastKey = keys[keys.length - 1];
  const last = data[lastKey];
  if (last.from === "bot" && !last.typing) {
    await remove(ref(db, `messages/${lastKey}`));
    toast("Régénération…");
  }
  const history = await buildHistory();
  await callAI([{ role: "system", content: SYSTEM_PROMPT }, ...history]);
};

/* ─── EXPORT ─── */
async function getMessages() {
  const snap = await get(msgsRef);
  return snap.val() || {};
}

window.exportJSON = async function() {
  const data = await getMessages();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  download(blob, "conversation.json");
  document.getElementById("exportModal").classList.remove("open");
};

window.exportTXT = async function() {
  const data = await getMessages();
  const lines = Object.values(data)
    .filter(m => !m.typing && (m.text || m.image))
    .map(m => {
      const who = m.from === "user" ? "Utilisateur" : "Bot";
      const time = m.ts ? new Date(m.ts).toLocaleString("fr-FR") : "";
      return `[${who}${time ? " · " + time : ""}]\n${m.image ? "[Image]" : m.text}\n`;
    }).join("\n");
  const blob = new Blob([lines], { type: "text/plain" });
  download(blob, "conversation.txt");
  document.getElementById("exportModal").classList.remove("open");
};

function download(blob, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`Export "${name}" téléchargé`);
}
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #0f1115;
  color: #eee;
  max-width: 700px;
  margin: 20px auto;
}

h1 {
  text-align: center;
  color: #ff8c42;
}

#chat {
  background: #1a1d24;
  border-radius: 12px;
  padding: 15px;
  height: 420px;
  overflow-y: auto;
  box-shadow: 0 0 25px rgba(255,140,66,0.15);
}

.msg {
  margin: 10px 0;
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 12px;
}

.bot {
  background: #2a2f3a;
}

img.chat-img {
  max-width: 220px;
  border-radius: 10px;
}

#controls {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1a1d24;
  color: white;
}

button {
  background: linear-gradient(135deg, #ff8c42, #ff5e00);
  border: none;
  color: white;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.85;
}

#dropzone {
  border: 2px dashed #ff8c42;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 10px;
  cursor: pointer;
  background: rgba(255,140,66,0.05);
}
</style>
</head>

<body>

<h1>Admin – IA</h1>

<div id="chat"></div>

<div id="dropzone">
  Dépose une image ici ou clique
  <input type="file" id="fileInput" accept="image/*" hidden>
</div>

<div id="controls">
  <input id="reply" placeholder="Répondre...">
  <button id="send">Envoyer</button>
  <button id="aiReply">IA</button>
  <button id="clear">Clear</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://aifake-3ed4f-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db, "messages");

const chat = document.getElementById("chat");
const reply = document.getElementById("reply");

onValue(messagesRef, (snapshot) => {
  const data = snapshot.val();
  chat.innerHTML = "";

  for (let id in data) {
    const m = data[id];
    const div = document.createElement("div");
    div.className = "msg bot";

    if (m.image) {
      const img = document.createElement("img");
      img.src = m.image;
      img.className = "chat-img";
      div.appendChild(img);
    } else {
      div.textContent = m.from + " : " + m.text;
    }

    chat.appendChild(div);
  }

  chat.scrollTop = chat.scrollHeight;
});

document.getElementById("send").onclick = () => {
  const text = reply.value.trim();
  if (!text) return;
  push(messagesRef, { from: "bot", text });
  reply.value = "";
};

document.getElementById("clear").onclick = () => {
  if (confirm("Tout supprimer ?")) remove(messagesRef);
};

document.getElementById("aiReply").onclick = async () => {
  const snapshot = await get(messagesRef);
  const data = snapshot.val();
  const keys = Object.keys(data);
  const last = data[keys[keys.length - 1]];

  if (last.from !== "user") return alert("Dernier message pas user");

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer TA_CLE_API_OPENAI"
    },
    body: JSON.stringify({
      model: "gpt-4.1-mini",
      messages: [
        { role: "system", content: "Tu es un assistant sympa." },
        { role: "user", content: last.text }
      ]
    })
  });

  const result = await response.json();

  const reply = result.choices?.[0]?.message?.content || "Erreur IA";

  push(messagesRef, { from: "bot", text: reply });
};

/* Dropzone */
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");

dropzone.onclick = () => fileInput.click();

fileInput.onchange = () => handleFile(fileInput.files[0]);

dropzone.ondrop = (e) => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

function handleFile(file) {
  if (!file || !file.type.startsWith("image/")) return;

  const reader = new FileReader();
  reader.onload = () => {
    push(messagesRef, { from: "bot", image: reader.result });
  };
  reader.readAsDataURL(file);
}
</script>

</body>
</html>

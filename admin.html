<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #0f1115;
  color: #eee;
  max-width: 700px;
  margin: 20px auto;
}
h1 { text-align: center; color: #ff8c42; }
#chat {
  background: #1a1d24;
  border-radius: 12px;
  padding: 15px;
  height: 420px;
  overflow-y: auto;
  box-shadow: 0 0 25px rgba(255,140,66,0.15);
}
.msg {
  margin: 10px 0;
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 12px;
}
.bot { background: #2a2f3a; }
img.chat-img { max-width: 220px; border-radius: 10px; }
#controls { display: flex; gap: 10px; margin-top: 15px; }
input[type="text"], input:not([type]) {
  flex: 1; padding: 10px; border-radius: 8px;
  border: none; background: #1a1d24; color: white;
}
button {
  background: linear-gradient(135deg, #ff8c42, #ff5e00);
  border: none; color: white; padding: 10px 14px;
  border-radius: 8px; cursor: pointer;
}
button:hover { opacity: 0.85; }
#dropzone {
  border: 2px dashed #ff8c42; border-radius: 12px;
  padding: 20px; text-align: center; margin-bottom: 10px;
  cursor: pointer; background: rgba(255,140,66,0.05);
}
</style>
</head>
<body>

<h1>Admin – IA</h1>
<div id="chat"></div>
<div id="dropzone">
  Dépose une image ici ou clique
  <input type="file" id="fileInput" accept="image/*" hidden>
</div>
<div id="controls">
  <input id="reply" placeholder="Répondre...">
  <button id="send">Envoyer</button>
  <button id="aiReply">IA</button>
  <button id="clear">Clear</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://aifake-3ed4f-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db, "messages");

const chat = document.getElementById("chat");
const replyInput = document.getElementById("reply");

const API_KEY = "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";

// Typing indicator
let typingRef = null;
let typingTimeout = null;

replyInput.addEventListener("input", async () => {
  if (replyInput.value.trim() && !typingRef) {
    typingRef = await push(messagesRef, { from: "bot", text: "", typing: true });
  }
  clearTimeout(typingTimeout);
  if (!replyInput.value.trim()) {
    if (typingRef) { await remove(typingRef); typingRef = null; }
    return;
  }
  typingTimeout = setTimeout(async () => {
    if (typingRef) { await remove(typingRef); typingRef = null; }
  }, 3000);
});

// Send
document.getElementById("send").onclick = async () => {
  const text = replyInput.value.trim();
  if (!text) return;
  replyInput.value = "";
  if (typingRef) { await remove(typingRef); typingRef = null; }
  clearTimeout(typingTimeout);
  const tRef = await push(messagesRef, { from: "bot", text: "", typing: true });
  setTimeout(async () => {
    await remove(tRef);
    push(messagesRef, { from: "bot", text });
  }, 1500);
};

// AI Reply
document.getElementById("aiReply").onclick = async () => {
  const snapshot = await get(messagesRef);
  const data = snapshot.val();
  if (!data) return alert("Aucun message");

  const keys = Object.keys(data);
  const last = data[keys[keys.length - 1]];
  if (last.from !== "user") return alert("Dernier message pas de l'utilisateur");

  const history = keys
    .map(k => data[k])
    .filter(function(m) { return !m.typing && !m.image && m.text; })
    .map(function(m) {
      return { role: m.from === "user" ? "user" : "assistant", content: m.text };
    });

  const tRef = await push(messagesRef, { from: "bot", text: "", typing: true });

  try {
    const messages = [{ role: "system", content: "Tu es un assistant sympa et concis. Réponds en français." }];
    for (var i = 0; i < history.length; i++) { messages.push(history[i]); }

    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY,
        "HTTP-Referer": window.location.href,
        "X-Title": "Admin IA"
      },
      body: JSON.stringify({
        model: "openrouter/free",
        messages: messages
      })
    });

    const result = await response.json();
    const aiText = result.choices[0].message.content || "Erreur IA";
    await remove(tRef);
    push(messagesRef, { from: "bot", text: aiText });

  } catch (err) {
    await remove(tRef);
    push(messagesRef, { from: "bot", text: "Erreur lors de la requête IA." });
    console.error(err);
  }
};

// Clear
document.getElementById("clear").onclick = () => {
  if (confirm("Tout supprimer ?")) remove(messagesRef);
};

// Live display
onValue(messagesRef, (snapshot) => {
  const data = snapshot.val();
  chat.innerHTML = "";
  for (let id in data) {
    const m = data[id];
    const div = document.createElement("div");
    div.className = "msg bot";
    if (m.image) {
      const img = document.createElement("img");
      img.src = m.image;
      img.className = "chat-img";
      div.appendChild(img);
    } else {
      div.textContent = m.from + " : " + (m.typing ? "⏳ typing..." : m.text);
    }
    chat.appendChild(div);
  }
  chat.scrollTop = chat.scrollHeight;
});

// Dropzone
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
dropzone.onclick = () => fileInput.click();
dropzone.ondragover = (e) => { e.preventDefault(); dropzone.style.background = "rgba(255,140,66,0.15)"; };
dropzone.ondragleave = () => { dropzone.style.background = "rgba(255,140,66,0.05)"; };
dropzone.ondrop = (e) => {
  e.preventDefault();
  dropzone.style.background = "rgba(255,140,66,0.05)";
  handleFile(e.dataTransfer.files[0]);
};
fileInput.onchange = () => handleFile(fileInput.files[0]);

function handleFile(file) {
  if (!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = () => { push(messagesRef, { from: "bot", image: reader.result }); };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>

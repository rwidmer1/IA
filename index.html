<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fake IA</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    .msg { margin: 5px 0; }
    .user { text-align: right; color: blue; }
    .bot { text-align: left; color: green; }
  </style>
</head>
<body>
  <h1>Assistant IA 🤖</h1>
  <div id="chat"></div>
  <form id="form">
    <input id="input" type="text" placeholder="Écris ton message..." style="width:80%;" required>
    <button type="submit">Envoyer</button>
  </form>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');

    const KEY = 'fake-ia-messages';

    function loadMessages() {
      const raw = localStorage.getItem(KEY);
      return raw ? JSON.parse(raw) : [];
    }

    function saveMessages(msgs) {
      localStorage.setItem(KEY, JSON.stringify(msgs));
    }

    function render() {
      const msgs = loadMessages();
      chat.innerHTML = '';
      msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + (m.from === 'user' ? 'user' : 'bot');
        div.textContent = m.text;
        chat.appendChild(div);
      });
      chat.scrollTop = chat.scrollHeight;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      const msgs = loadMessages();
      msgs.push({ from: 'user', text });
      saveMessages(msgs);
      input.value = '';
      render();
    });

    render();
  </script>
</body>
</html>

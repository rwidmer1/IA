<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fake IA</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    .msg { margin: 5px 0; }
    .user { text-align: right; color: blue; }
    .bot { text-align: left; color: green; }
  </style>
</head>
<body>
  <h1>Assistant IA 🤖</h1>

  <div id="chat"></div>

  <form id="form">
    <input id="input" type="text" placeholder="Écris ton message..." style="width:80%;" required>
    <button type="submit">Envoyer</button>
  </form>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://aifake-3ed4f-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, "messages");

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      push(messagesRef, {
        from: "user",
        text: text
      });

      input.value = "";
    });

    onValue(messagesRef, (snapshot) => {
      const data = snapshot.val();
      chat.innerHTML = "";
      for (let id in data) {
        const m = data[id];
        const div = document.createElement("div");
        div.className = "msg " + (m.from === "user" ? "user" : "bot");
        div.textContent = m.text;
        chat.appendChild(div);
      }
      chat.scrollTop = chat.scrollHeight;
    });
  </script>
</body>
</html>

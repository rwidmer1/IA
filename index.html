<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fake IA</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    .msg { margin: 5px 0; }
    .user { text-align: right; color: blue; }
    .bot { text-align: left; color: green; }

    #dropzone {
      border: 2px dashed #aaa;
      padding: 20px;
      text-align: center;
      margin-bottom: 10px;
      cursor: pointer;
    }
    #dropzone:hover {
      background: #eef;
    }
    img.chat-img {
      max-width: 200px;
      margin-top: 5px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Assistant IA 🤖</h1>

  <div id="chat"></div>

  <!-- Zone de drop d'image -->
  <div id="dropzone">
    Dépose une image ici ou clique pour en choisir une
    <input type="file" id="fileInput" accept="image/*" style="display:none;">
  </div>

  <form id="form">
    <input id="input" type="text" placeholder="Écris ton message..." style="width:80%;" required>
    <button type="submit">Envoyer</button>
  </form>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://aifake-3ed4f-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, "messages");

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");

    /* --- Envoi message texte --- */
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      push(messagesRef, { from: "user", text });
      input.value = "";
    });

    /* --- Affichage messages --- */
    onValue(messagesRef, (snapshot) => {
      const data = snapshot.val();
      chat.innerHTML = "";
      for (let id in data) {
        const m = data[id];
        const div = document.createElement("div");
        div.className = "msg " + (m.from === "user" ? "user" : "bot");

        if (m.image) {
          const img = document.createElement("img");
          img.src = m.image;
          img.className = "chat-img";
          div.appendChild(img);
        } else {
          div.textContent = m.text;
        }

        chat.appendChild(div);
      }
      chat.scrollTop = chat.scrollHeight;
    });

    /* --- Gestion Dropzone --- */
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");

    dropzone.onclick = () => fileInput.click();

    dropzone.ondragover = (e) => {
      e.preventDefault();
      dropzone.style.background = "#eef";
    };

    dropzone.ondragleave = () => {
      dropzone.style.background = "transparent";
    };

    dropzone.ondrop = (e) => {
      e.preventDefault();
      dropzone.style.background = "transparent";
      handleFile(e.dataTransfer.files[0]);
    };

    fileInput.onchange = () => handleFile(fileInput.files[0]);

    function handleFile(file) {
      if (!file || !file.type.startsWith("image/")) return;

      const reader = new FileReader();
      reader.onload = () => {
        push(messagesRef, {
          from: "user",
          text: "[image]",
          image: reader.result
        });
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
